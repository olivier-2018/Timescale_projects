[pytest]
# Pytest configuration file

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Conftest location - add parent directory (project root) to Python path
pythonpath = ..

# Markers for organizing tests
markers =
    unit: Unit tests for individual modules
    integration: Integration tests combining multiple modules
    azure: Tests requiring Azure connectivity
    database: Tests requiring database connectivity
    slow: Tests that take longer to run

# Logging
log_cli = false
log_cli_level = INFO
log_file = test_results.log
log_file_level = DEBUG

# Coverage
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=.

# Timeout for tests (in seconds)
timeout = 300
