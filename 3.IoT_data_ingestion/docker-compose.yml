services:
  timescaledb:
    image: timescale/timescaledb-ha:pg15-amd64
    # Note: use image timescaledb:latest-pg15 if you want Timescale without extensions
    container_name: timescaledb
    restart: unless-stopped
    networks: [ 'timescale-network' ]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TIMESCALEDB_TELEMETRY: off
      # Force default database to prevent fallback to using "POSTGRES_USER" value
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./timescaledb_data:/home/postgres/pgdata/data
      - ./timescaledb_initdb:/docker-entrypoint-initdb.d
    depends_on:
      - data-folders-init
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  data-folders-init:
    image: alpine:3.19
    container_name: data-folders-init
    networks: [ 'timescale-network' ]
    command: >
      sh -c "
        echo '### Creating local folders...';

        # TimescaleDB container runner with UID 1000 (postgres)
        mkdir -p /timescaledb_data;
        chmod 700 /timescaledb_data;
        chown 1000:1000 /timescaledb_data;

        # Grafana container runner with UID 472 
        mkdir -p /grafana_data;
        chmod 755 /grafana_data;
        chown 472:472 /grafana_data;

        echo '### Folder initialization complete.';
      "
    volumes:
      - ./grafana_data:/grafana_data
      - ./timescaledb_data:/timescaledb_data
    restart: "no"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks: [ 'timescale-network' ]
    depends_on:
      - timescaledb
      - data-folders-init
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      # The PG variable are required for the provisioning of datasources
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./grafana_provisioning:/etc/grafana/provisioning

  azure-iot-ingestion:
    build: .
    image: azure-iot-ingestion
    container_name: azure-iot-ingestion
    restart: unless-stopped
    networks: [ 'timescale-network' ]
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      POSTGRES_HOST: "timescaledb"
      POSTGRES_PORT: ${POSGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      IOT_HUB_CONNECTION_STRING: ${IOT_HUB_CONNECTION_STRING}
      EVENTHUB_CONSUMER_GROUP: ${EVENTHUB_CONSUMER_GROUP}
      EVENTHUB_IGNORE_PAST: ${EVENTHUB_IGNORE_PAST}
      CHECKPOINT_STORE_CONNECTION_STRING: ${CHECKPOINT_STORE_CONNECTION_STRING}
      CHECKPOINT_STORE_CONTAINER_NAME: ${CHECKPOINT_STORE_CONTAINER_NAME}
      CHECKPOINT_UPDATE_FREQUENCY_MINUTES: ${CHECKPOINT_UPDATE_FREQUENCY_MINUTES}

networks:
  timescale-network:
    name: timescale-network
    driver: bridge
