apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    access: proxy    
    editable: true
    isDefault: true

    url: timescaledb
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}

    secureJsonData:
      password: ${POSTGRES_PASSWORD}

    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: true
